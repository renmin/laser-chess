<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="300" height="180">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c81d4e"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Danger zone hatch pattern -->
    <pattern id="dangerHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#ff4444" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="300" height="180" rx="8" fill="#1a1a2e"/>

  <text x="150" y="22" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="14" font-weight="bold">KING (Pharaoh) - Must be protected!</text>

  <!-- Red King -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="90" height="90" rx="8" fill="#2a1a2e" stroke="#444" stroke-width="1"/>
    <!-- Danger hatch on all sides -->
    <rect x="10" y="10" width="70" height="70" rx="6" fill="url(#dangerHatch)" stroke="url(#redGrad)" stroke-width="2"/>
    <rect x="10" y="10" width="70" height="70" rx="6" fill="url(#redGrad)" opacity="0.85" filter="url(#glow)"/>
    <!-- Crown symbol -->
    <polygon points="28,55 33,35 40,48 45,28 50,48 57,35 62,55" fill="#ffe66d" stroke="#1a1a2e" stroke-width="1"/>
    <rect x="28" y="55" width="34" height="6" rx="2" fill="#ffe66d"/>
    <!-- Small circles on crown tips -->
    <circle cx="33" cy="35" r="3" fill="#ffe66d"/>
    <circle cx="45" cy="28" r="3" fill="#ffe66d"/>
    <circle cx="57" cy="35" r="3" fill="#ffe66d"/>
    <text x="45" y="108" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="11">Red King</text>
  </g>

  <!-- Blue King -->
  <g transform="translate(170, 40)">
    <rect x="0" y="0" width="90" height="90" rx="8" fill="#1a2a3e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="70" height="70" rx="6" fill="url(#dangerHatch)" stroke="url(#blueGrad)" stroke-width="2"/>
    <rect x="10" y="10" width="70" height="70" rx="6" fill="url(#blueGrad)" opacity="0.85" filter="url(#glow)"/>
    <!-- Crown symbol -->
    <polygon points="28,55 33,35 40,48 45,28 50,48 57,35 62,55" fill="#ffe66d" stroke="#1a1a2e" stroke-width="1"/>
    <rect x="28" y="55" width="34" height="6" rx="2" fill="#ffe66d"/>
    <circle cx="33" cy="35" r="3" fill="#ffe66d"/>
    <circle cx="45" cy="28" r="3" fill="#ffe66d"/>
    <circle cx="57" cy="35" r="3" fill="#ffe66d"/>
    <text x="45" y="108" text-anchor="middle" fill="#00d4ff" font-family="Arial,sans-serif" font-size="11">Blue King</text>
  </g>

  <text x="150" y="170" text-anchor="middle" fill="#666" font-family="Arial,sans-serif" font-size="11">No mirrors. Vulnerable from ALL sides. Destroyed = Game Over.</text>
</svg>
