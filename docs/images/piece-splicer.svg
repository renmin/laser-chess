<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#c0e0ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="200" rx="8" fill="#1a1a2e"/>

  <text x="200" y="22" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="14" font-weight="bold">SPLICER (Beam Splitter) - Splits laser into 2 beams</text>

  <!-- Splicer Orientation A: X-shape splits -->
  <g transform="translate(30, 40)">
    <rect x="0" y="0" width="130" height="120" rx="8" fill="#2a1a3e" stroke="#444" stroke-width="1"/>
    <rect x="15" y="10" width="100" height="100" rx="6" fill="url(#purpleGrad)" filter="url(#glow)"/>
    <!-- X-shape double mirrors -->
    <line x1="30" y1="25" x2="100" y2="95" stroke="url(#mirrorGrad)" stroke-width="3" filter="url(#glow)"/>
    <line x1="100" y1="25" x2="30" y2="95" stroke="url(#mirrorGrad)" stroke-width="3" filter="url(#glow)"/>
    <!-- Center gem -->
    <polygon points="65,45 80,60 65,75 50,60" fill="#e0b0ff" stroke="#fff" stroke-width="1" opacity="0.8"/>
    <!-- Incoming beam from left -->
    <line x1="0" y1="60" x2="50" y2="60" stroke="#ffe66d" stroke-width="2.5" filter="url(#laserGlow)"/>
    <!-- Split beam going up -->
    <line x1="65" y1="45" x2="65" y2="10" stroke="#ffe66d" stroke-width="2.5" filter="url(#laserGlow)"/>
    <!-- Split beam going down -->
    <line x1="65" y1="75" x2="65" y2="110" stroke="#ffe66d" stroke-width="2.5" filter="url(#laserGlow)"/>
    <!-- Labels -->
    <text x="8" y="55" fill="#ffe66d" font-family="Arial,sans-serif" font-size="10">IN →</text>
    <text x="70" y="15" fill="#ffe66d" font-family="Arial,sans-serif" font-size="10">OUT ↑</text>
    <text x="70" y="117" fill="#ffe66d" font-family="Arial,sans-serif" font-size="10">OUT ↓</text>
    <text x="65" y="142" text-anchor="middle" fill="#a855f7" font-family="Arial,sans-serif" font-size="10">╳ type</text>
  </g>

  <!-- Splicer example with beam path diagram -->
  <g transform="translate(200, 40)">
    <rect x="0" y="0" width="170" height="120" rx="8" fill="#2a1a3e" stroke="#444" stroke-width="1"/>
    <text x="85" y="20" text-anchor="middle" fill="#ddd" font-family="Arial,sans-serif" font-size="11">How splitting works:</text>

    <!-- Mini board grid 3x3 -->
    <g transform="translate(25, 30)">
      <!-- Grid -->
      <rect x="0" y="0" width="120" height="80" fill="#0f3460" rx="3"/>
      <line x1="40" y1="0" x2="40" y2="80" stroke="#1a4a7a" stroke-width="1"/>
      <line x1="80" y1="0" x2="80" y2="80" stroke="#1a4a7a" stroke-width="1"/>
      <line x1="0" y1="27" x2="120" y2="27" stroke="#1a4a7a" stroke-width="1"/>
      <line x1="0" y1="54" x2="120" y2="54" stroke="#1a4a7a" stroke-width="1"/>

      <!-- Splicer piece in center -->
      <rect x="46" y="33" width="28" height="20" rx="3" fill="url(#purpleGrad)" opacity="0.8"/>
      <text x="60" y="47" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="10">✦</text>

      <!-- Incoming laser from left -->
      <line x1="0" y1="43" x2="46" y2="43" stroke="#ffe66d" stroke-width="2" filter="url(#laserGlow)"/>
      <!-- Split up -->
      <line x1="60" y1="33" x2="60" y2="0" stroke="#ffe66d" stroke-width="2" filter="url(#laserGlow)"/>
      <!-- Split down -->
      <line x1="60" y1="53" x2="60" y2="80" stroke="#ffe66d" stroke-width="2" filter="url(#laserGlow)"/>

      <!-- Arrow indicators -->
      <text x="-5" y="46" fill="#ffe66d" font-family="Arial,sans-serif" font-size="9">→</text>
      <text x="63" y="8" fill="#ffe66d" font-family="Arial,sans-serif" font-size="9">↑</text>
      <text x="63" y="78" fill="#ffe66d" font-family="Arial,sans-serif" font-size="9">↓</text>
    </g>

    <text x="85" y="118" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="9">1 beam in → 2 beams out (perpendicular)</text>
  </g>

  <text x="200" y="180" text-anchor="middle" fill="#666" font-family="Arial,sans-serif" font-size="11">0-2 per side. Advanced scenarios only. Both output beams continue independently.</text>
  <text x="200" y="195" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">Can be destroyed if hit on a vulnerable side.</text>
</svg>
