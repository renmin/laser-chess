<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c81d4e"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="520" height="180" rx="8" fill="#1a1a2e"/>

  <text x="260" y="22" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="14" font-weight="bold">SPHINX (Laser Source) - Fixed in corner, rotates only</text>

  <!-- Red Sphinx facing Right -->
  <g transform="translate(30, 45)">
    <rect x="0" y="0" width="90" height="90" rx="8" fill="#2a1a2e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="70" height="70" rx="6" fill="url(#redGrad)" filter="url(#glow)"/>
    <!-- Laser emitter triangle pointing right -->
    <polygon points="55,25 75,45 55,65" fill="#1a1a2e"/>
    <polygon points="57,30 70,45 57,60" fill="#ffe66d" opacity="0.9"/>
    <!-- Laser beam -->
    <line x1="75" y1="45" x2="90" y2="45" stroke="#ffe66d" stroke-width="3" filter="url(#laserGlow)"/>
    <text x="45" y="105" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="11">Red →</text>
  </g>

  <!-- Red Sphinx facing Up -->
  <g transform="translate(140, 45)">
    <rect x="0" y="0" width="90" height="90" rx="8" fill="#2a1a2e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="70" height="70" rx="6" fill="url(#redGrad)" filter="url(#glow)"/>
    <polygon points="25,35 45,15 65,35" fill="#1a1a2e"/>
    <polygon points="30,33 45,20 60,33" fill="#ffe66d" opacity="0.9"/>
    <line x1="45" y1="10" x2="45" y2="0" stroke="#ffe66d" stroke-width="3" filter="url(#laserGlow)"/>
    <text x="45" y="105" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="11">Red ↑</text>
  </g>

  <!-- Blue Sphinx facing Left -->
  <g transform="translate(280, 45)">
    <rect x="0" y="0" width="90" height="90" rx="8" fill="#1a2a3e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="70" height="70" rx="6" fill="url(#blueGrad)" filter="url(#glow)"/>
    <polygon points="35,25 15,45 35,65" fill="#1a1a2e"/>
    <polygon points="33,30 20,45 33,60" fill="#ffe66d" opacity="0.9"/>
    <line x1="0" y1="45" x2="15" y2="45" stroke="#ffe66d" stroke-width="3" filter="url(#laserGlow)"/>
    <text x="45" y="105" text-anchor="middle" fill="#00d4ff" font-family="Arial,sans-serif" font-size="11">Blue ←</text>
  </g>

  <!-- Blue Sphinx facing Down -->
  <g transform="translate(390, 45)">
    <rect x="0" y="0" width="90" height="90" rx="8" fill="#1a2a3e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="70" height="70" rx="6" fill="url(#blueGrad)" filter="url(#glow)"/>
    <polygon points="25,55 45,75 65,55" fill="#1a1a2e"/>
    <polygon points="30,57 45,70 60,57" fill="#ffe66d" opacity="0.9"/>
    <line x1="45" y1="80" x2="45" y2="90" stroke="#ffe66d" stroke-width="3" filter="url(#laserGlow)"/>
    <text x="45" y="105" text-anchor="middle" fill="#00d4ff" font-family="Arial,sans-serif" font-size="11">Blue ↓</text>
  </g>

  <text x="260" y="170" text-anchor="middle" fill="#666" font-family="Arial,sans-serif" font-size="11">Cannot move. Can only rotate 90 degrees. Cannot be destroyed. Fires laser each turn.</text>
</svg>
