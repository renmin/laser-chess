<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c81d4e"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#c0e0ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#daa520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="180" rx="8" fill="#1a1a2e"/>

  <text x="200" y="22" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="14" font-weight="bold">SCARAB (Double Mirror) - 2 Orientations - Indestructible</text>

  <!-- Orientation 1: NW-SE diagonal (╲) -->
  <g transform="translate(50, 40)">
    <rect x="0" y="0" width="110" height="110" rx="8" fill="#2a2a1e" stroke="#daa520" stroke-width="1.5"/>
    <rect x="10" y="10" width="90" height="90" rx="6" fill="url(#goldGrad)" opacity="0.3" filter="url(#glow)"/>
    <rect x="10" y="10" width="90" height="90" rx="6" fill="url(#redGrad)" opacity="0.7"/>
    <!-- Double mirror NW-SE: both diagonals have mirrors -->
    <line x1="20" y1="20" x2="90" y2="90" stroke="url(#mirrorGrad)" stroke-width="5" filter="url(#goldGlow)"/>
    <!-- Small mirror indicators on both ends -->
    <circle cx="20" cy="20" r="5" fill="#ffd700" opacity="0.6"/>
    <circle cx="90" cy="90" r="5" fill="#ffd700" opacity="0.6"/>
    <!-- Gold scarab beetle icon -->
    <ellipse cx="55" cy="55" rx="15" ry="12" fill="#ffd700" opacity="0.5"/>
    <ellipse cx="55" cy="55" rx="10" ry="8" fill="#daa520" opacity="0.6"/>
    <!-- Star marker for indestructible -->
    <text x="55" y="60" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="bold">★</text>
    <text x="55" y="128" text-anchor="middle" fill="#daa520" font-family="Arial,sans-serif" font-size="10">╲ NW-SE</text>
  </g>

  <!-- Orientation 2: NE-SW diagonal (╱) -->
  <g transform="translate(230, 40)">
    <rect x="0" y="0" width="110" height="110" rx="8" fill="#1a2a2e" stroke="#daa520" stroke-width="1.5"/>
    <rect x="10" y="10" width="90" height="90" rx="6" fill="url(#goldGrad)" opacity="0.3" filter="url(#glow)"/>
    <rect x="10" y="10" width="90" height="90" rx="6" fill="url(#blueGrad)" opacity="0.7"/>
    <!-- Double mirror NE-SW -->
    <line x1="90" y1="20" x2="20" y2="90" stroke="url(#mirrorGrad)" stroke-width="5" filter="url(#goldGlow)"/>
    <circle cx="90" cy="20" r="5" fill="#ffd700" opacity="0.6"/>
    <circle cx="20" cy="90" r="5" fill="#ffd700" opacity="0.6"/>
    <!-- Gold scarab beetle icon -->
    <ellipse cx="55" cy="55" rx="15" ry="12" fill="#ffd700" opacity="0.5"/>
    <ellipse cx="55" cy="55" rx="10" ry="8" fill="#daa520" opacity="0.6"/>
    <text x="55" y="60" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="bold">★</text>
    <text x="55" y="128" text-anchor="middle" fill="#daa520" font-family="Arial,sans-serif" font-size="10">╱ NE-SW</text>
  </g>

  <text x="200" y="172" text-anchor="middle" fill="#666" font-family="Arial,sans-serif" font-size="11">2 per player. CANNOT be destroyed. Can SWAP with adjacent Pyramid or Anubis.</text>
</svg>
