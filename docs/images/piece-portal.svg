<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="portalGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7931e"/>
    </linearGradient>
    <linearGradient id="portalGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="portalGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="200" rx="8" fill="#1a1a2e"/>

  <text x="250" y="22" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="14" font-weight="bold">PORTAL (Teleporter) - Always in pairs, teleports laser beam</text>

  <!-- Portal A (Orange) -->
  <g transform="translate(30, 38)">
    <rect x="0" y="0" width="100" height="100" rx="8" fill="#2a1a1e" stroke="#ff6b35" stroke-width="1.5"/>
    <rect x="10" y="10" width="80" height="80" rx="6" fill="url(#portalGradA)" opacity="0.3"/>
    <!-- Portal rings -->
    <circle cx="50" cy="50" r="32" fill="none" stroke="#ff6b35" stroke-width="3" filter="url(#portalGlow)"/>
    <circle cx="50" cy="50" r="24" fill="none" stroke="#f7931e" stroke-width="2" opacity="0.8"/>
    <circle cx="50" cy="50" r="16" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.6"/>
    <circle cx="50" cy="50" r="8" fill="#ff6b35" opacity="0.4"/>
    <!-- Center dot -->
    <circle cx="50" cy="50" r="3" fill="#fff" opacity="0.9"/>
    <!-- Label -->
    <text x="50" y="55" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="10" font-weight="bold">A</text>
    <text x="50" y="118" text-anchor="middle" fill="#ff6b35" font-family="Arial,sans-serif" font-size="11">Portal A</text>
  </g>

  <!-- Connection line / teleport arrow -->
  <g transform="translate(130, 88)">
    <!-- Dashed teleport line -->
    <line x1="10" y1="0" x2="90" y2="0" stroke="#888" stroke-width="2" stroke-dasharray="6,4"/>
    <!-- Laser entering Portal A -->
    <line x1="-20" y1="0" x2="10" y2="0" stroke="#ffe66d" stroke-width="2.5" filter="url(#laserGlow)"/>
    <!-- Laser exiting Portal B -->
    <line x1="90" y1="0" x2="120" y2="0" stroke="#ffe66d" stroke-width="2.5" filter="url(#laserGlow)"/>
    <!-- Arrow heads -->
    <polygon points="55,5 65,0 55,-5" fill="#888"/>
    <!-- Teleport label -->
    <text x="50" y="-8" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="9">TELEPORT</text>
    <text x="50" y="15" text-anchor="middle" fill="#666" font-family="Arial,sans-serif" font-size="8">same direction</text>
  </g>

  <!-- Portal B (Blue) -->
  <g transform="translate(250, 38)">
    <rect x="0" y="0" width="100" height="100" rx="8" fill="#1a1a2e" stroke="#3498db" stroke-width="1.5"/>
    <rect x="10" y="10" width="80" height="80" rx="6" fill="url(#portalGradB)" opacity="0.3"/>
    <!-- Portal rings -->
    <circle cx="50" cy="50" r="32" fill="none" stroke="#3498db" stroke-width="3" filter="url(#portalGlow)"/>
    <circle cx="50" cy="50" r="24" fill="none" stroke="#2980b9" stroke-width="2" opacity="0.8"/>
    <circle cx="50" cy="50" r="16" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.6"/>
    <circle cx="50" cy="50" r="8" fill="#3498db" opacity="0.4"/>
    <circle cx="50" cy="50" r="3" fill="#fff" opacity="0.9"/>
    <text x="50" y="55" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="10" font-weight="bold">B</text>
    <text x="50" y="118" text-anchor="middle" fill="#3498db" font-family="Arial,sans-serif" font-size="11">Portal B</text>
  </g>

  <!-- Usage example mini board -->
  <g transform="translate(375, 38)">
    <rect x="0" y="0" width="100" height="120" rx="6" fill="#0f3460"/>
    <text x="50" y="15" text-anchor="middle" fill="#ddd" font-family="Arial,sans-serif" font-size="9">Example:</text>
    <!-- Mini grid -->
    <rect x="10" y="22" width="80" height="80" fill="none" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="30" y1="22" x2="30" y2="102" stroke="#1a4a7a" stroke-width="0.5"/>
    <line x1="50" y1="22" x2="50" y2="102" stroke="#1a4a7a" stroke-width="0.5"/>
    <line x1="70" y1="22" x2="70" y2="102" stroke="#1a4a7a" stroke-width="0.5"/>
    <line x1="10" y1="42" x2="90" y2="42" stroke="#1a4a7a" stroke-width="0.5"/>
    <line x1="10" y1="62" x2="90" y2="62" stroke="#1a4a7a" stroke-width="0.5"/>
    <line x1="10" y1="82" x2="90" y2="82" stroke="#1a4a7a" stroke-width="0.5"/>
    <!-- Portal A at top-left -->
    <circle cx="20" cy="32" r="6" fill="#ff6b35" opacity="0.7"/>
    <text x="20" y="35" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="7">A</text>
    <!-- Portal B at bottom-right -->
    <circle cx="80" cy="92" r="6" fill="#3498db" opacity="0.7"/>
    <text x="80" y="95" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="7">B</text>
    <!-- Laser going into A (from left) -->
    <line x1="5" y1="32" x2="14" y2="32" stroke="#ffe66d" stroke-width="1.5"/>
    <!-- Laser coming out of B (continues right) -->
    <line x1="86" y1="92" x2="95" y2="92" stroke="#ffe66d" stroke-width="1.5"/>
    <!-- Teleport dash -->
    <line x1="20" y1="38" x2="80" y2="86" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3"/>
    <text x="50" y="115" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="7">A→B teleport</text>
  </g>

  <text x="250" y="178" text-anchor="middle" fill="#666" font-family="Arial,sans-serif" font-size="11">0-2 pairs. Advanced scenarios only. Laser enters one portal, exits the other in same direction.</text>
  <text x="250" y="193" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">Can be moved/rotated. Destroyed if hit by laser on non-entry side.</text>
</svg>
