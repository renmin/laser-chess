<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c81d4e"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888"/>
      <stop offset="50%" style="stop-color:#ddd"/>
      <stop offset="100%" style="stop-color:#888"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="560" height="200" rx="8" fill="#1a1a2e"/>

  <text x="280" y="22" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="14" font-weight="bold">ANUBIS (Guard) - 4 Orientations - Shield blocks laser from front</text>

  <!-- Shield facing North (top) -->
  <g transform="translate(20, 38)">
    <rect x="0" y="0" width="110" height="110" rx="8" fill="#2a1a2e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="90" height="90" rx="6" fill="url(#redGrad)" filter="url(#glow)"/>
    <!-- Shield bar at top -->
    <rect x="12" y="10" width="86" height="12" rx="3" fill="url(#shieldGrad)" opacity="0.95"/>
    <rect x="12" y="10" width="86" height="12" rx="3" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <!-- Anubis icon -->
    <text x="55" y="68" text-anchor="middle" fill="#1a1a2e" font-family="Arial,sans-serif" font-size="28" font-weight="bold">A</text>
    <!-- Direction arrow -->
    <text x="55" y="7" text-anchor="middle" fill="#88ff88" font-family="Arial,sans-serif" font-size="10">▲ SHIELD</text>
    <text x="55" y="95" text-anchor="middle" fill="#ff6666" font-family="Arial,sans-serif" font-size="8" opacity="0.7">vulnerable</text>
    <text x="55" y="128" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Shield ↑ N</text>
  </g>

  <!-- Shield facing East (right) -->
  <g transform="translate(150, 38)">
    <rect x="0" y="0" width="110" height="110" rx="8" fill="#2a1a2e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="90" height="90" rx="6" fill="url(#redGrad)" filter="url(#glow)"/>
    <!-- Shield bar at right -->
    <rect x="88" y="12" width="12" height="86" rx="3" fill="url(#shieldGrad)" opacity="0.95"/>
    <rect x="88" y="12" width="12" height="86" rx="3" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <text x="50" y="62" text-anchor="middle" fill="#1a1a2e" font-family="Arial,sans-serif" font-size="28" font-weight="bold">A</text>
    <text x="55" y="128" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Shield → E</text>
  </g>

  <!-- Shield facing South (bottom) -->
  <g transform="translate(280, 38)">
    <rect x="0" y="0" width="110" height="110" rx="8" fill="#1a2a3e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="90" height="90" rx="6" fill="url(#blueGrad)" filter="url(#glow)"/>
    <!-- Shield bar at bottom -->
    <rect x="12" y="88" width="86" height="12" rx="3" fill="url(#shieldGrad)" opacity="0.95"/>
    <rect x="12" y="88" width="86" height="12" rx="3" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <text x="55" y="62" text-anchor="middle" fill="#1a1a2e" font-family="Arial,sans-serif" font-size="28" font-weight="bold">A</text>
    <text x="55" y="128" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Shield ↓ S</text>
  </g>

  <!-- Shield facing West (left) -->
  <g transform="translate(410, 38)">
    <rect x="0" y="0" width="110" height="110" rx="8" fill="#1a2a3e" stroke="#444" stroke-width="1"/>
    <rect x="10" y="10" width="90" height="90" rx="6" fill="url(#blueGrad)" filter="url(#glow)"/>
    <!-- Shield bar at left -->
    <rect x="10" y="12" width="12" height="86" rx="3" fill="url(#shieldGrad)" opacity="0.95"/>
    <rect x="10" y="12" width="12" height="86" rx="3" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <text x="60" y="62" text-anchor="middle" fill="#1a1a2e" font-family="Arial,sans-serif" font-size="28" font-weight="bold">A</text>
    <text x="55" y="128" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Shield ← W</text>
  </g>

  <!-- Legend at bottom -->
  <rect x="40" y="170" width="30" height="8" rx="2" fill="url(#shieldGrad)"/>
  <text x="80" y="178" fill="#88ff88" font-family="Arial,sans-serif" font-size="10">= Shield (absorbs laser, piece survives)</text>
  <text x="340" y="178" fill="#ff6666" font-family="Arial,sans-serif" font-size="10">Other 3 sides = vulnerable (destroyed if hit)</text>

  <text x="280" y="196" text-anchor="middle" fill="#666" font-family="Arial,sans-serif" font-size="11">2 per player. Shield BLOCKS laser (no reflection). Destroyed from non-shield sides.</text>
</svg>
