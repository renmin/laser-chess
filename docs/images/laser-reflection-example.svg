<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" width="650" height="400">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c81d4e"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0984e3"/>
    </linearGradient>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#c0e0ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888"/>
      <stop offset="50%" style="stop-color:#ddd"/>
      <stop offset="100%" style="stop-color:#888"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="destroyGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="650" height="400" rx="8" fill="#1a1a2e"/>

  <text x="325" y="24" text-anchor="middle" fill="#ddd" font-family="Arial,sans-serif" font-size="16" font-weight="bold">Laser Reflection Example - How Beams Travel</text>
  <text x="325" y="42" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="11">Red Sphinx fires → laser reflects off 3 mirrors → hits Blue King!</text>

  <!-- Mini Board 7x5 for example -->
  <g transform="translate(60, 55)">
    <!-- Board background -->
    <rect x="0" y="0" width="490" height="250" rx="4" fill="#0a2040" stroke="#1a4a7a" stroke-width="2"/>

    <!-- Grid lines - 7 cols x 5 rows, cell size = 70x50 -->
    <line x1="70" y1="0" x2="70" y2="250" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="140" y1="0" x2="140" y2="250" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="210" y1="0" x2="210" y2="250" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="250" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="250" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="250" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="0" y1="50" x2="490" y2="50" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="0" y1="100" x2="490" y2="100" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="0" y1="150" x2="490" y2="150" stroke="#1a4a7a" stroke-width="1"/>
    <line x1="0" y1="200" x2="490" y2="200" stroke="#1a4a7a" stroke-width="1"/>

    <!-- STEP NUMBERS -->
    <!-- Step labels along the laser path -->

    <!-- Red Sphinx at (0,4) facing right → -->
    <rect x="5" y="205" width="60" height="40" rx="4" fill="url(#redGrad)" filter="url(#glow)"/>
    <polygon points="25,215 48,225 25,235" fill="#1a1a2e"/>
    <polygon points="27,218 44,225 27,232" fill="#ffe66d" opacity="0.8"/>
    <text x="35" y="255" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="9">Sphinx →</text>

    <!-- LASER PATH -->
    <!-- Step 1: Sphinx fires right across row 4 to mirror at (3,4) -->
    <line x1="65" y1="225" x2="215" y2="225" stroke="#ffe66d" stroke-width="3" filter="url(#laserGlow)"/>
    <text x="140" y="243" text-anchor="middle" fill="#ffe66d" font-family="Arial,sans-serif" font-size="9" opacity="0.7">step 1: → travel right</text>

    <!-- Red Pyramid at (3,4) ◢ orientation - reflects E→N (right→up) -->
    <rect x="215" y="205" width="60" height="40" rx="4" fill="url(#redGrad)" filter="url(#glow)"/>
    <polygon points="221,211 269,239 221,239" fill="#c81d4e" opacity="0.5"/>
    <line x1="221" y1="211" x2="269" y2="239" stroke="url(#mirrorGrad)" stroke-width="2.5"/>
    <text x="245" y="255" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="9">◢ mirror</text>

    <!-- Step 2: Reflects up from (3,4) to (3,1) -->
    <line x1="245" y1="205" x2="245" y2="80" stroke="#ffe66d" stroke-width="3" filter="url(#laserGlow)"/>
    <text x="257" y="145" fill="#ffe66d" font-family="Arial,sans-serif" font-size="9" opacity="0.7">step 2: ↑</text>

    <!-- Blue Pyramid at (3,1) ◣ orientation - reflects N→E (up hits, reflects right) actually: incoming from south going north, mirror ◣ reflects to east -->
    <!-- Wait: ◣ reflects ↑(N incoming = from south going north) → going East → -->
    <rect x="215" y="55" width="60" height="40" rx="4" fill="url(#blueGrad)" filter="url(#glow)"/>
    <polygon points="269,61 221,89 269,89" fill="#0974d3" opacity="0.5"/>
    <line x1="269" y1="61" x2="221" y2="89" stroke="url(#mirrorGrad)" stroke-width="2.5"/>
    <text x="245" y="105" text-anchor="middle" fill="#00d4ff" font-family="Arial,sans-serif" font-size="9">◣ mirror</text>

    <!-- Step 3: Reflects right from (3,1) to (5,1) -->
    <line x1="275" y1="75" x2="355" y2="75" stroke="#ffe66d" stroke-width="3" filter="url(#laserGlow)"/>
    <text x="315" y="68" text-anchor="middle" fill="#ffe66d" font-family="Arial,sans-serif" font-size="9" opacity="0.7">step 3: →</text>

    <!-- Red Pyramid at (5,1) ◢ orientation - reflects E→N -->
    <rect x="355" y="55" width="60" height="40" rx="4" fill="url(#redGrad)" filter="url(#glow)"/>
    <polygon points="361,61 409,89 361,89" fill="#c81d4e" opacity="0.5"/>
    <line x1="361" y1="61" x2="409" y2="89" stroke="url(#mirrorGrad)" stroke-width="2.5"/>
    <text x="385" y="105" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="9">◢ mirror</text>

    <!-- Step 4: Reflects up from (5,1) to (5,0) -->
    <line x1="385" y1="55" x2="385" y2="30" stroke="#ffe66d" stroke-width="3" filter="url(#laserGlow)"/>
    <text x="405" y="45" fill="#ffe66d" font-family="Arial,sans-serif" font-size="9" opacity="0.7">step 4: ↑</text>

    <!-- Blue King at (5,0) - HIT! -->
    <rect x="355" y="5" width="60" height="40" rx="4" fill="url(#blueGrad)" filter="url(#glow)"/>
    <polygon points="372,32 375,20 379,28 381,14 383,28 387,20 390,32" fill="#ffe66d" stroke="#1a1a2e" stroke-width="0.5"/>
    <rect x="372" y="32" width="18" height="3" rx="1" fill="#ffe66d"/>
    <!-- Explosion/hit indicator -->
    <circle cx="385" cy="25" r="28" fill="#ff0000" opacity="0.15" filter="url(#destroyGlow)"/>
    <circle cx="385" cy="25" r="18" fill="#ff4444" opacity="0.2"/>
    <text x="385" y="-2" text-anchor="middle" fill="#ff4444" font-family="Arial,sans-serif" font-size="11" font-weight="bold">HIT!</text>

    <!-- Anubis at (1,2) - shield facing right, NOT in laser path (just for context) -->
    <rect x="75" y="105" width="60" height="40" rx="4" fill="url(#redGrad)" filter="url(#glow)"/>
    <rect x="127" y="107" width="6" height="36" rx="2" fill="url(#shieldGrad)" opacity="0.9"/>
    <text x="100" y="130" text-anchor="middle" fill="#1a1a2e" font-family="Arial,sans-serif" font-size="14" font-weight="bold">A</text>
    <text x="105" y="155" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="9">Anubis →</text>
  </g>

  <!-- Step-by-step explanation -->
  <g transform="translate(60, 325)">
    <rect x="0" y="0" width="530" height="65" rx="4" fill="#0a2040" stroke="#1a4a7a" stroke-width="1"/>
    <text x="10" y="16" fill="#ffe66d" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Laser path breakdown:</text>
    <text x="10" y="32" fill="#ccc" font-family="Arial,sans-serif" font-size="10">1. Sphinx fires → east    2. Hits ◢ mirror → reflects ↑ north    3. Hits ◣ mirror → reflects → east</text>
    <text x="10" y="48" fill="#ccc" font-family="Arial,sans-serif" font-size="10">4. Hits ◢ mirror → reflects ↑ north    5. Hits Blue King → </text>
    <text x="352" y="48" fill="#ff4444" font-family="Arial,sans-serif" font-size="10" font-weight="bold">DESTROYED! Red wins!</text>
  </g>
</svg>
